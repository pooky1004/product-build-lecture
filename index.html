<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="numbers"></div>
        <button id="generate">Generate Numbers</button>
    </div>

    <button id="contact-btn">Partnership Inquiry</button>

    <div id="contact-form-container" class="hidden">
        <div class="form-content">
            <span class="close-btn">&times;</span>
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mykbawoq" method="POST">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </div>

    <div id="disqus_thread"></div>
    <script>

        })();

    <script src="main.js"></script>
</body>
</html>
