<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Face Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Which one are you, a cat or a dog?</h1>
        <p>Upload a picture to find out!</p>
        <button type="button" id="upload-button">Upload Image</button>
        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        <img id="image-preview" src="#" alt="Your Image" style="display: none; max-width: 400px; margin-top: 1rem;"/>
        <div id="label-container"></div>
    </div>

    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
